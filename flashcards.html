<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <title>Kannada to Tulu Flashcards</title>
   <!-- Google Fonts: Noto Serif Kannada -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&display=swap" rel="stylesheet">
  <style>
   

    body {
      font-family: 'Noto Serif Kannada', serif;
      background: #f9f9f9;
      text-align: center;
      padding: 30px;
    }

    .flashcard-image {
      margin-bottom: 12px;
      min-height: 100px;
    }

    .flashcard-image img {
      max-width: 200px;
      max-height: 200px;
      width: auto;
      height: auto;
      display: inline-block;
    }

    .kannadaWord {
      font-size: 30px;
      margin-bottom: 10px;
      font-family: 'Noto Serif Kannada', serif;
    }

    .options {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 24px;
       
    }

    .option {
      padding: 10px 20px;
      font-size: 32px;
      background: #fff;
      border: 2px solid #5d0fee;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s, border 0.3s;
      min-width: 140px;
    }

    
    .option:hover {
      border-color: #000;
    }

    #progress {
      height: 20px;
      width: 80%;
      background: #ccc;
      margin: 30px auto 10px;
      border-radius: 10px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #28a745;
      transition: width 0.4s ease-in-out;
    }

    #scoreText {
      font-size: 20px;
    }

    header {
      text-align: center;
      padding: 20px 10px 10px;
      background-color: #80004d;
      color: white;
    }

    .Kodava-logo {
      width: 120px;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 36px;
      margin: 0;
    }

    nav {
      background-color: #f2f2f2;
      text-align: center;
      padding: 12px;
    }

    nav a {
      color: #80004d;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .content {
      max-width: 900px;
      margin: auto;
      padding: 30px;
      text-align: justify;
      font-size: 18px;
      color: #333;
      line-height: 1.8;
    }

    footer {
      background-color: #80004d;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }

    .option.correct {
      background-color: #90ee90 !important;
      border-color: #28a745 !important;
    }

    .option.wrong {
      background-color: #ffcccb !important;
      border-color: #dc3545 !important;
      color: #900;
    }
  </style>
</head>
<body>
  <header>
     <img src="kodavalogo.png" alt="Kodava-logo" class="Kodava-logo">
      <h1>ಕೊಡವ ಪಡಿಪು </h1>
  </header>

  <!-- Navigation Bar -->
  <nav>
    <a href="index.html">Kodava Letters</a>
    <a href="quiz.html">Quiz</a>
    <a href="flashcards.html">Flashcards</a>
    <a href="letters.html">Letters</a>
  </nav>
  <h1>Kannada to Kodava Flashcards (MCQ)</h1>
 
  <!-- Show image here -->
  <div class="flashcard-image" id="flashcardImage"></div>
  <!-- Show only Kannada word here -->
  <div class="kannadaWord" id="kannadaLetter"></div>
  <!-- Options -->
  <div class="options" id="optionButtons"></div>
  <!-- Progress bar -->
  <div id="progress">
    <div id="bar"></div>
  </div>
  <p id="scoreText">Score: 0 / 0</p>

  <script>
    const mapping = {
      '<img src="Kodava words.jpg" alt="ಕೊಡವ ಎಳ್ದ್‍" class="ಕೊಡವ ಎಳ್ದ್‍"><h1>ಕೊಡವ ಎಳ್ದ್‍</h1>': 'ಕೊಡವ ಪದಗಳು',   
      '<img src="avva.jpg" alt="ಅವ್ವ " class="ಅವ್ವ"><h1>ಅವ್ವ</h1>': 'ತಾಯಿ',
      '<img src="ane.jpg" alt="ಆನೆ" class="ಆನೆ"><h1>ಆನೆ</h1>': 'ಆನೆ',
      '<img src="igguttappa.jpg" alt="ಇಗ್ಗ್‌ತ್ತಪ್ಪ" class="ಇಗ್ಗ್‌ತ್ತಪ್ಪ"><h1>ಇಗ್ಗ್‌ತ್ತಪ್ಪ</h1>': 'ಇಗ್ಗುತ್ತಪ್ಪ',
      '<img src="id.jpg" alt="ಈ್ಡ್‍" class="ಈ್ಡ್‍"><h1>ಈ್ಡ್‍</h1>': 'ಪುತ್ತರಿ ಕೋಲಾಟ',
      '<img src="eetepann.jpg" alt="ಈತೆ ಪಣ್ಣ್" class="ಈತೆ ಪಣ್ಣ್"><h1>ಈತೆ ಪಣ್ಣ್</h1>': 'ಖರ್ಜೂರ',
      '<img src="ittige.jpg" alt="ಇ್‍ಟ್ಟಿಗೆ" class="ಇ್‍ಟ್ಟಿಗೆ"><h1>ಇ್‍ಟ್ಟಿಗೆ</h1>': 'ಇಟ್ಟಿಗೆ',
      '<img src="umbala mane.jpg" alt="ಉಂಬಳ ಮನೆ" class="ಉಂಬಳ ಮನೆ"><h1>ಉಂಬಳ ಮನೆ</h1>': 'ಅಡಿಗೆ ಮನೆ',
      '<img src="uru.jpg" alt="ಊರ್" class="ಊರ್"><h1>ಊರ್</h1>': 'ಊರು',
      '<img src="eli.jpg" alt="ಎಲಿ" class="ಎಲಿ"><h1>ಎಲಿ</h1>': 'ಎಲಿ',
      '<img src="ett.png" alt="ಎ್‍ಟ್ಟ್" class="ಎ್‍ಟ್ಟ್"><h1>ಎ್‍ಟ್ಟ್</h1>': 'ಎಂಟು',
      '<img src="embe.jpg" alt="ಏಂಬೆ" class="ಏಂಬೆ"><h1>ಏಂಬೆ</h1>': 'ಕಣ್ಣಿನ ರೆಪ್ಪೆ',
      '<img src="eni.jpg" alt="ಏ್‍ಣಿ﻿﻿" class="ಏ್‍ಣಿ﻿﻿"><h1>ಏ್‍ಣಿ﻿﻿</h1>': 'ಏಣಿ',
      '<img src="ainmane.jpg" alt="ಐನ್‍ಮನೆ" class="ಐನ್‍ಮನೆ"><h1>ಐನ್‍ಮನೆ</h1>': 'ಮೂಲ ಮನೆ(ತಾರುವಾಡು)',
      '<img src="odekatti.jpg" alt="ಒಡಿಕತ್ತಿ" class="ಒಡಿಕತ್ತಿ"><h1>ಒಡಿಕತ್ತಿ</h1>': 'ಕೊಡವರ ಕತ್ತಿ',
      '<img src="od.jpg" alt="ಓಡ್" class="ಓಡ್"><h1>ಓಡ್</h1>': 'ಕಾವಲಿ',
      '<img src="aunja.jpg" alt="ಔಂಜ" class="ಔಂಜ"><h1>ಔಂಜ</h1>': 'ಜಗಿಯು',
      '<img src="kada.jpg" alt="ಕಡ" class="ಕಡ"><h1>ಕಡ</h1>': 'ಸಮುದ್ರ',
      '<img src="gaddala.jpg" alt="ಗದ್ದಳ" class="ಗದ್ದಳ"><h1>ಗದ್ದಳ</h1>': 'ಸದ್ಯ',
      '<img src="ngaadi.jpg" alt="ಚಂಙಾದಿ" class="ಚಂಙಾದಿ"><h1>ಚಂಙಾದಿ</h1>': 'ಗೆಳೆಯ',
      '<img src="chakke.jpg" alt="ಚಕ್ಕೆ" class="ಚಕ್ಕೆ"><h1>ಚಕ್ಕೆ</h1>': 'ಹಲಸಿನ ಹಣ್ಣು',
      '<img src="jariva.jpg" alt="ಜರಿವ" class="ಜರಿವ"><h1>ಜರಿವ</h1>': 'ಜರಿದು ಬೀಳು',
      '<img src="njand.jpg" alt="ಞಂಡ್" class="ಞಂಡ್"><h1>ಞಂಡ್</h1>': 'ಏಡಿ',
      '<img src="tappal.jpg" alt="ಟಪಾಲ್" class="ಟಪಾಲ್"><h1>ಟಪಾಲ್</h1>': 'ಟಪ್ಪಾಲು',
      '<img src="dennada.jpg" alt="ಡೆನ್ನಡ" class=" ಡೆನ್ನಡ"><h1> ಡೆನ್ನಡ</h1>': 'ನನ್ನದು',
      '<img src=" pana.jpg" alt=" ಪಣ" class=" ಪಣ"><h1> ಪಣ </h1>': 'ಹಣ',
      '<img src="takk.jpg" alt="ತಕ್ಕ್" class="ತಕ್ಕ್"><h1>ತಕ್ಕ್</h1>': 'ಮಾತು',
      '<img src="dand.jpg" alt="ದಂಡ್" class="ದಂಡ್"><h1>ದಂಡ್</h1>': 'ಎರಡು',
      '<img src="nala.jpg" alt="ನಳ" class="ನಳ"><h1>ನಳ</h1>': 'ನೆರಳು',
      '<img src="pandi.jpg" alt="ಪಂದಿ" class="ಪಂದಿ"><h1>ಪಂದಿ</h1>': 'ಹಂದಿ',
      '<img src="batte.jpg" alt="ಬಟ್ಟೆ" class="ಬಟ್ಟೆ"><h1>ಬಟ್ಟೆ</h1>': 'ದಾರಿ',
      '<img src="mangala.jpg" alt="ಮಂಗಲ" class="ಮಂಗಲ"><h1>ಮಂಗಲ</h1>': 'ಮದುವೆ',
      '<img src="yarci.jpg" alt="ಯರ್ಚಿ" class="ಯರ್ಚಿ"><h1>ಯರ್ಚಿ</h1>': 'ಮಾಂಸ',
      '<img src="rang.jpg" alt="ರಂಗ್" class="ರಂಗ್"><h1>ರಂಗ್</h1>': 'ಬಣ್ಣ',
      '<img src="landra.jpg" alt="ಲಾಂದ್ರ" class="ಲಾಂದ್ರ"><h1>ಲಾಂದ್ರ</h1>': 'ಲಾಟೀನು',
      '<img src="vark.jpg" alt="ವರ್‌ಕ್" class="ವರ್‌ಕ್"><h1>ವರ್‌ಕ್</h1>': 'ನಿದ್ರೆ',
      '<img src="sineya.jpg" alt="ಸಿನೆಯ" class="ಸಿನೆಯ"><h1>ಸಿನೆಯ</h1>': 'ಗೆಳೆತನ',
      '<img src="halaba.jpg" alt="ಹಳಬ" class="ಹಳಬ"><h1>ಹಳಬ</h1>': 'ವೃದ್ಧ',
      '<img src="nari.jpg" alt="ನರಿ" class="ನರಿ"><h1>ನರಿ</h1>': 'ಹುಲಿ',
    };

    const allKeys = Object.keys(mapping);
    let shuffledKeys = shuffleArray([...allKeys]).slice(0, 20);

    let current = 0;
    let correct = 0;
    let currentFontClass = 'malligeFont';

    const flashcardImage = document.getElementById('flashcardImage');
    const letterDiv = document.getElementById('kannadaLetter');
    const optionsDiv = document.getElementById('optionButtons');
    const scoreText = document.getElementById('scoreText');
    const bar = document.getElementById('bar');

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function generateOptions(correctAnswer) {
      const allValues = Object.values(mapping).filter(v => v !== correctAnswer);
      const wrong = shuffleArray(allValues).slice(0, 3);
      return shuffleArray([correctAnswer, ...wrong]);
    }

    function extractImageAndWord(html) {
      const imgMatch = html.match(/<img[^>]+>/);
      const wordMatch = html.match(/<h1>(.*?)<\/h1>/);
      return {
        img: imgMatch ? imgMatch[0] : '',
        word: wordMatch ? wordMatch[1] : '',
      };
    }

    function loadCard() {
      const currentLetter = shuffledKeys[current];
      const correctAnswer = mapping[currentLetter];
      const options = generateOptions(correctAnswer);

      const { img, word } = extractImageAndWord(currentLetter);

      flashcardImage.innerHTML = img;
      letterDiv.textContent = word;
      optionsDiv.innerHTML = '';

      options.forEach(opt => {
        const btn = document.createElement('div');
        btn.className = `option ${currentFontClass}`;
        btn.textContent = opt;
        btn.onclick = () => handleAnswer(opt === correctAnswer, btn, correctAnswer);
        optionsDiv.appendChild(btn);
      });
    }

    function handleAnswer(isCorrect, clickedBtn, correctAnswer) {
      const optionButtons = document.querySelectorAll('.option');
      optionButtons.forEach(btn => btn.onclick = null);

      if (isCorrect) {
        clickedBtn.classList.add('correct');
      } else {
        clickedBtn.classList.add('wrong');
        optionButtons.forEach(btn => {
          if (btn.textContent === correctAnswer) {
            btn.classList.add('correct');
          }
        });
      }

      if (isCorrect) correct++;
      current++;
      scoreText.textContent = `Score: ${correct} / ${current}`;
      bar.style.width = `${(current / shuffledKeys.length) * 100}%`;

      setTimeout(() => {
        if (current < shuffledKeys.length) {
          loadCard();
        } else {
          setTimeout(() => {
            alert(`Finished! Final score: ${correct} / ${shuffledKeys.length}`);
            current = 0;
            correct = 0;
            shuffledKeys = shuffleArray([...allKeys]);
            scoreText.textContent = `Score: 0 / 0`;
            bar.style.width = "0%";
            loadCard();
          }, 200);
        }
      }, 1000);
    }

    function changeFont(selectedFont) {
      currentFontClass = selectedFont;
      loadCard(); // reload to apply new font
    }

    loadCard();
  </script>
</body>
</html>
