<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodava Padipu - Learn & Quiz</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&family=Noto+Serif+Malayalam:wght@400;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #80004d;
      --secondary-color: #5d0fee;
      --success-color: #28a745;
      --wrong-color: #dc3545;
    }

    body {
      font-family: 'Noto Serif Kannada', 'Noto Serif Malayalam', serif;
      background: #f9f9f9;
      margin: 0;
      text-align: center;
      color: #333;
    }

   header {
      background-color: var(--primary-color);
      color: white;
      padding: 30px 10px;
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .Kodava-logo { width: 120px; height: auto; }
    h1 { margin: 0; font-size: 32px; }

    nav {
  background-color: #f2f2f2;
  padding: 12px;
  border-bottom: 2px solid #ddd;
  display: flex;
  justify-content: center;
  gap: 10px;          /* Reduced gap slightly for better fit */
  row-gap: 15px;      /* Adds vertical space between rows */
  align-items: center;
  flex-wrap: wrap;    /* THIS IS THE KEY: allows items to wrap to a second line */
}
    .nav-box {
      text-decoration: none;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 10px;
      color: white !important;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-box:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); filter: brightness(1.1); }
    
    .nav-home { background-color: #555; }
    .nav-letters { background-color: #e67e22; }
    .nav-animals { background-color: #27ae60; }
    .nav-insects { background-color: #2980b9; }
    .nav-households { background-color: #e213c0; }
    .nav-relations { background-color: #12e8f0; }
    .nav-pronouns { background-color: #1d06ec; }
    .nav-time { background-color: #d63a0a; }
    .nav-body { background-color: #06e951; }
    .nav-colours { background-color: #0a0b0c; }
    .nav-numbers { background-color: #8de763; }
    .nav-verbs { background-color: #79261b; }

    nav a, .lang-btn {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      background: white;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Automatically fits more items per row */
  gap: 15px;
  max-width: 950px;
  margin: 30px auto;
  padding: 0 20px;
}

    .gallery-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { 
  width: 100%; 
  height: 150px; /* Reduced from 200px */
  object-fit: contain; /* Shows full image without cropping */
  background: #f0f0f0; /* Adds a light background for transparent images */
  border-radius: 8px; 
}
    
    /* Style for the multi-part label */
    .word-label {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .word-kodava { font-size: 22px; color: var(--primary-color); font-weight: bold; }
    .word-eng { font-size: 16px; color: #666; font-style: italic; }
    .word-mean { font-size: 18px; color: #333; border-top: 1px solid #eee; padding-top: 5px; }

    #quiz-section {
      display: none;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
    }

    .flashcard-image img { 
  max-width: 100%; 
  max-height: 200px; /* Reduced from 300px */
  object-fit: contain; 
  border-radius: 10px; 
  margin-bottom: 10px;
}
    .kannadaWord { font-size: 36px; margin: 20px 0; color: var(--primary-color); }
    .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }

    .option {
      padding: 15px 30px;
      font-size: 22px;
      background: #fff;
      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      cursor: pointer;
      min-width: 180px;
      transition: 0.2s;
    }

    .option.correct { background-color: #90ee90 !important; border-color: var(--success-color) !important; }
    .option.wrong { background-color: #ffcccb !important; border-color: var(--wrong-color) !important; }

    .btn-start {
      background: var(--primary-color);
      color: white;
      padding: 18px 60px;
      font-size: 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 40px 0;
      box-shadow: 0 4px 15px rgba(128, 0, 77, 0.3);
    }

    #progress { height: 12px; width: 80%; background: #eee; margin: 30px auto 10px; border-radius: 10px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: var(--success-color); transition: 0.4s; }

    #modal {
      display: none;
      position: fixed;
      z-index: 2000;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
    }
    #modal img { max-width: 90%; max-height: 85%; border: 4px solid white; }
  </style>
</head>
<body>

 <header>
    <img src="kodavalogo.png" alt="Logo" class="Kodava-logo">
    <h1 id="main-title" data-kn="ಕೊಡವ ಪಡಿಪು" data-ml="കൊടവ പഠിപ്പു">ಕೊಡವ ಪಡಿಪು</h1>
  </header>
<nav>
    <a href="index.html" class="nav-box nav-home"><i class="fas fa-home"></i> Home</a>
    <a href="letters.html" class="nav-box nav-letters"><i class="fas fa-font"></i> Letters</a>
    <a href="animals.html" class="nav-box nav-animals"><i class="fas fa-paw"></i> Animals</a>
    <a href="insects.html" class="nav-box nav-insects"><i class="fas fa-bug"></i> Insects</a>
    <a href="households.html" class="nav-box nav-households"><i class="fas fa-couch"></i> Households</a>
    <a href="relations.html" class="nav-box nav-relations"><i class="fas fa-users"></i> Relations</a>
    <a href="pronouns.html" class="nav-box nav-pronouns"><i class="fas fa-user-tag"></i> Pronouns</a>
    <a href="time.html" class="nav-box nav-time"><i class="fas fa-clock"></i> Time</a>
    <a href="body.html" class="nav-box nav-body"><i class="fas fa-child"></i> Body</a>
    <a href="colours.html" class="nav-box nav-colours"><i class="fas fa-palette"></i> Colours</a>
    <a href="numbers.html" class="nav-box nav-numbers"><i class="fas fa-list-ol"></i> Numbers</a>
     <a href="verbs.html" class="nav-box nav-numbers"><i class="fas fa-running"></i> Verbs</a>
  </nav>
  <nav>
    <button id="btn-kn" class="lang-btn active" onclick="setLanguage('kn')">ಕನ್ನಡ</button>
    <button id="btn-ml" class="lang-btn" onclick="setLanguage('ml')">മലയാളം</button>
  </nav>

  <div id="home-screen">
    <div class="gallery-container" id="gallery"></div>
    <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quiz-section">
    
    <div class="kannadaWord" id="kodavaWordDisplay"></div>
    <div class="options" id="optionButtons"></div>
    <div id="progress"><div id="bar"></div></div>
    <p id="scoreText">Score: 0 / 0</p>
    <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:grey; cursor:pointer;">Quit Quiz</button>
  </div>

  <div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
  </div>

  <script>
    const quizData = [
      { img: 'animals.jpg', eng: 'Kodava takkl jātiya', kn_kodava: 'ಕೊಡವ ತಕ್ಕ್ಲ್‍ ಜಾತಿಯ', ml_kodava: 'കൊഡവ തക്ക്ല് ജാതിയ', kn_mean: 'ಕೊಡವದಲ್ಲಿ ಜಂತುಗಳು', ml_mean: 'കൊടവയിലെ മൃഗങ്ങൾ' },
      { img: 'buffalo.jpg', eng: 'ĕmmĕ', kn_kodava: 'ಎಮ್ಮೆ', ml_kodava: 'എമ്മെ', kn_mean: 'ಎಮ್ಮೆ', ml_mean: 'എരുമ' },
      { img: 'cat.jpg', eng: 'pūññĕ', kn_kodava: 'ಪೂಞ್ಞೆ', ml_kodava: 'പൂഞ്ഞെ', kn_mean: 'ಬೆಕ್ಕು', ml_mean: 'പൂച്ച' },
      { img: 'cow.jpg', eng: 'payyu', kn_kodava: 'ಪಯ್ಯು', ml_kodava: 'പയ്യു', kn_mean: 'ಹಸು', ml_mean: 'പശു' },
      { img: 'crocodile.jpg', eng: 'mŏsaḷĕ', kn_kodava: 'ಮೊಸಳೆ', ml_kodava: 'മൊസളെ', kn_mean: 'ಮೊಸಳೆ', ml_mean: 'ചീങ്കണ്ണി' },
      { img: 'deer.jpg', eng: 'miga', kn_kodava: 'ಮಿಗ', ml_kodava: 'മിഗ', kn_mean: 'ಜಿಂಕೆ', ml_mean: 'മാൻ' },
      { img: 'dog.jpg', eng: 'nāyi', kn_kodava: 'ನಾಯಿ', ml_kodava: 'നായി', kn_mean: 'ನಾಯಿ', ml_mean: 'നായ' },
      { img: 'donkey.jpg', eng: 'kattĕ', kn_kodava: 'ಕತ್ತೆ', ml_kodava: 'കത്തെ', kn_mean: 'ಕತ್ತೆ', ml_mean: 'കഴുത' },
      { img: 'fish.jpg', eng: 'mīn', kn_kodava: 'ಮೀನ್', ml_kodava: 'മീൻ', kn_mean: 'ಮೀನು', ml_mean: 'മീൻ' },
      { img: 'fox.jpg', eng: 'kurka', kn_kodava: 'ಕುರ್‍‍ಕ​', ml_kodava: 'കുർക', kn_mean: 'ನರಿ', ml_mean: 'കുറുക്കൻ' },
      { img: 'frog.jpg', eng: 'kappĕ', kn_kodava: 'ಕಪ್ಪೆ', ml_kodava: 'കപ്പെ', kn_mean: 'ಕಪ್ಪೆ', ml_mean: 'തവള' },
      { img: 'goat.jpg', eng: 'āḍ', kn_kodava: 'ಆಡ್', ml_kodava: 'ആഡ്', kn_mean: 'ಆಡು', ml_mean: 'ആട്' },
      { img: 'horse.jpg', eng: 'kudrĕ', kn_kodava: 'ಕುದ್‍ರೆ', ml_kodava: 'കുദ്രെ', kn_mean: 'ಕುದುರೆ', ml_mean: 'കുതിര' },
      { img: 'lion.jpg', eng: 'singa', kn_kodava: 'ಸಿಂಗ', ml_kodava: 'സിംഗ', kn_mean: 'ಸಿಂಹ', ml_mean: 'സിംഹം' },
      { img: 'monkey.jpg', eng: 'koḍa', kn_kodava: 'ಕೋಡ​', ml_kodava: 'കോഡ', kn_mean: 'ಕೋತಿ', ml_mean: 'കുരങ്ങൻ' },
      { img: 'ox.jpg', eng: 'ĕtt', kn_kodava: 'ಎತ್ತ್', ml_kodava: 'എത്ത്', kn_mean: 'ಎತ್ತು', ml_mean: 'കാള' },
      { img: 'pig.jpg', eng: 'pandi', kn_kodava: 'ಪಂದಿ', ml_kodava: 'പന്ദി', kn_mean: 'ಹಂದಿ', ml_mean: 'പന്നി' },
      { img: 'rabbit.jpg', eng: 'mŏna ', kn_kodava: 'ಮೊನ', ml_kodava: 'മൊന', kn_mean: 'ಮೊಲ', ml_mean: 'മുയൽ' },
      { img: 'eli.jpg', eng: 'ĕli', kn_kodava: 'ಎಲಿ', ml_kodava: 'എലി', kn_mean: 'ಇಲಿ', ml_mean: 'എലി' },
      { img: 'sheep.jpg', eng: 'kŏri', kn_kodava: 'ಕೊರಿ', ml_kodava: 'കൊരി', kn_mean: 'ಕುರಿ', ml_mean: 'ചെമ്മരിയാട്' },
      { img: 'snake.jpg', eng: 'pāṃb', kn_kodava: 'ಪಾಂಬ್', ml_kodava: 'പാംബ്', kn_mean: 'ಹಾವು', ml_mean: 'പാമ്പ്' },
      { img: 'squirrel.jpg', eng: 'kŏriya ', kn_kodava: 'ಕೊರಿಯ​', ml_kodava: 'കൊരിയ', kn_mean: 'ಅಳಿಲು', ml_mean: 'അണ്ണാൻ' },
      { img: 'tortoise.jpg', eng: 'āmĕ', kn_kodava: 'ಆಮೆ', ml_kodava: 'ആമെ', kn_mean: 'ಆಮೆ', ml_mean: 'ആമ' },
      { img: 'ane.jpg', eng: 'ānĕ', kn_kodava: 'ಆನೆ', ml_kodava: 'ആനെ', kn_mean: 'ಆನೆ', ml_mean: 'ആന' },
      { img: 'bear.jpg', eng: 'karaḍi', kn_kodava: 'ಕರಡಿ', ml_kodava: 'കരഡി', kn_mean: 'ಕರಡಿ', ml_mean: 'കരടി' },
      { img: 'lizard.jpg', eng: 'palli', kn_kodava: 'ಪಲ್ಲಿ', ml_kodava: 'പല്ലി', kn_mean: 'ಹಲ್ಲಿ', ml_mean: 'പല്ലി' }, 
      { img: 'mongoose.png', eng: 'kīri', kn_kodava: 'ಕೀರಿ', ml_kodava: 'കീരി', kn_mean: 'ಮುಂಗುಸಿ', ml_mean: 'കീരി' },
      { img: 'camel.jpg', eng: 'ŏnṭĕ', kn_kodava: 'ಒoಟೆ', ml_kodava: 'ഒoടെ', kn_mean: 'ಒಂಟೆ', ml_mean: 'ഒട്ടകം' },
    ];

    let currentLanguage = 'kn';
    let currentQuizIndex = 0;
    let score = 0;
    let selectedSet = [];

    function init() {
      renderGallery();
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${lang}`).classList.add('active');
      document.getElementById('main-title').textContent = (lang === 'kn') ? 'ಕೊಡವ ಪಡಿಪು' : 'കൊടവ പഠിപ്പു';
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      quizData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.onclick = () => zoomImage(item.img);
        
        const kodavaWord = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;
        const meaning = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
        
        div.innerHTML = `
          <img src="${item.img}" alt="${item.eng}">
          <div class="word-label">
            <span class="word-kodava">${kodavaWord}</span>
            <span class="word-eng">- ${item.eng} -</span>
            <span class="word-mean">${meaning}</span>
          </div>
        `;
        gallery.appendChild(div);
      });
    }

    function zoomImage(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    function startQuiz() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      selectedSet = shuffleArray([...quizData]);
      currentQuizIndex = 0;
      score = 0;
      loadCard();
    }

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function loadCard() {
      if (currentQuizIndex >= selectedSet.length) {
        alert(`Finished! Score: ${score} / ${selectedSet.length}`);
        location.reload();
        return;
      }
      const item = selectedSet[currentQuizIndex];
      const wordDisplay = document.getElementById('kodavaWordDisplay');
      const optionsDiv = document.getElementById('optionButtons');

      wordDisplay.textContent = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;

      const correct = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
      let options = [correct];
      while (options.length < 4) {
        let randomItem = quizData[Math.floor(Math.random() * quizData.length)];
        let randomWord = (currentLanguage === 'kn') ? randomItem.kn_mean : randomItem.ml_mean;
        if (!options.includes(randomWord)) options.push(randomWord);
      }

      optionsDiv.innerHTML = '';
      shuffleArray(options).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, correct, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btn) {
      const allBtns = document.querySelectorAll('.option');
      allBtns.forEach(b => b.onclick = null);
      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      }
      currentQuizIndex++;
      setTimeout(() => {
        document.getElementById('scoreText').textContent = `Score: ${score} / ${currentQuizIndex}`;
        document.getElementById('bar').style.width = `${(currentQuizIndex / selectedSet.length) * 100}%`;
        loadCard();
      }, 1000);
    }

    init();
  </script>
</body>
</html>
