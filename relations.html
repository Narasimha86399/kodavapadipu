<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodava Padipu - Learn & Quiz</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&family=Noto+Serif+Malayalam:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #80004d;
      --secondary-color: #5d0fee;
      --success-color: #28a745;
      --wrong-color: #dc3545;
    }

    body {
      font-family: 'Noto Serif Kannada', 'Noto Serif Malayalam', serif;
      background: #f9f9f9;
      margin: 0;
      text-align: center;
      color: #333;
    }

    header {
      background-color: var(--primary-color);
      color: white;
      padding: 30px 10px;
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .Kodava-logo { width: 120px; height: auto; }
    h1 { margin: 0; font-size: 32px; }

    nav {
      background-color: #f2f2f2;
      padding: 12px;
      border-bottom: 2px solid #ddd;
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: center;
    }

    nav {
  background-color: #f2f2f2;
  padding: 12px;
  border-bottom: 2px solid #ddd;
  display: flex;
  justify-content: center;
  gap: 10px;          /* Reduced gap slightly for better fit */
  row-gap: 15px;      /* Adds vertical space between rows */
  align-items: center;
  flex-wrap: wrap;    /* THIS IS THE KEY: allows items to wrap to a second line */
}
    .nav-box {
      text-decoration: none;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 10px;
      color: white !important;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-box:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); filter: brightness(1.1); }
    
    .nav-home { background-color: #555; }
    .nav-letters { background-color: #e67e22; }
    .nav-animals { background-color: #27ae60; }
    .nav-insects { background-color: #2980b9; }
    .nav-households { background-color: #e213c0; }
    .nav-relations { background-color: #12e8f0; }
    .nav-pronouns { background-color: #1d06ec; }
    .nav-time { background-color: #d63a0a; }
    .nav-body { background-color: #06e951; }
    .nav-colours { background-color: #0a0b0c; }
    .nav-numbers { background-color: #8de763; }
    .nav-verbs { background-color: #79261b; }
    nav a, .lang-btn {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      background: white;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Automatically fits more items per row */
  gap: 15px;
  max-width: 950px;
  margin: 30px auto;
  padding: 0 20px;
}

    .gallery-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { 
  width: 100%; 
  height: 150px; /* Reduced from 200px */
  object-fit: contain; /* Shows full image without cropping */
  background: #f0f0f0; /* Adds a light background for transparent images */
  border-radius: 8px; 
}
    
    /* Style for the multi-part label */
    .word-label {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .word-kodava { font-size: 22px; color: var(--primary-color); font-weight: bold; }
    .word-eng { font-size: 16px; color: #666; font-style: italic; }
    .word-mean { font-size: 18px; color: #333; border-top: 1px solid #eee; padding-top: 5px; }

    #quiz-section {
      display: none;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
    }

    .flashcard-image img { 
  max-width: 100%; 
  max-height: 200px; /* Reduced from 300px */
  object-fit: contain; 
  border-radius: 10px; 
  margin-bottom: 10px;
}
    .kannadaWord { font-size: 36px; margin: 20px 0; color: var(--primary-color); }
    .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }

    .option {
      padding: 15px 30px;
      font-size: 22px;
      background: #fff;
      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      cursor: pointer;
      min-width: 180px;
      transition: 0.2s;
    }

    .option.correct { background-color: #90ee90 !important; border-color: var(--success-color) !important; }
    .option.wrong { background-color: #ffcccb !important; border-color: var(--wrong-color) !important; }

    .btn-start {
      background: var(--primary-color);
      color: white;
      padding: 18px 60px;
      font-size: 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 40px 0;
      box-shadow: 0 4px 15px rgba(128, 0, 77, 0.3);
    }

    #progress { height: 12px; width: 80%; background: #eee; margin: 30px auto 10px; border-radius: 10px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: var(--success-color); transition: 0.4s; }

    #modal {
      display: none;
      position: fixed;
      z-index: 2000;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
    }
    #modal img { max-width: 90%; max-height: 85%; border: 4px solid white; }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <img src="kodavalogo.png" alt="Kodava-logo" class="Kodava-logo">
      <h1 id="main-title">ಕೊಡವ ಪಡಿಪು</h1>
    </div>
  </header>
<nav>
    <a href="index.html" class="nav-box nav-home"><i class="fas fa-home"></i> Home</a>
    <a href="letters.html" class="nav-box nav-letters"><i class="fas fa-font"></i> Letters</a>
    <a href="animals.html" class="nav-box nav-animals"><i class="fas fa-paw"></i> Animals</a>
    <a href="insects.html" class="nav-box nav-insects"><i class="fas fa-bug"></i> Insects</a>
    <a href="households.html" class="nav-box nav-households"><i class="fas fa-couch"></i> Households</a>
    <a href="relations.html" class="nav-box nav-relations"><i class="fas fa-users"></i> Relations</a>
    <a href="pronouns.html" class="nav-box nav-pronouns"><i class="fas fa-user-tag"></i> Pronouns</a>
    <a href="time.html" class="nav-box nav-time"><i class="fas fa-clock"></i> Time</a>
    <a href="body.html" class="nav-box nav-body"><i class="fas fa-child"></i> Body</a>
    <a href="colours.html" class="nav-box nav-colours"><i class="fas fa-palette"></i> Colours</a>
    <a href="numbers.html" class="nav-box nav-numbers"><i class="fas fa-list-ol"></i> Numbers</a>
     <a href="verbs.html" class="nav-box nav-numbers"><i class="fas fa-running"></i> Verbs</a>
  </nav>
  <nav>
    <button id="btn-kn" class="lang-btn active" onclick="setLanguage('kn')">ಕನ್ನಡ</button>
    <button id="btn-ml" class="lang-btn" onclick="setLanguage('ml')">മലയാളം</button>
  </nav>

  <div id="home-screen">
    <div class="gallery-container" id="gallery"></div>
    <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quiz-section">
    <div class="kannadaWord" id="kodavaWordDisplay"></div>
    <div class="options" id="optionButtons"></div>
    <div id="progress"><div id="bar"></div></div>
    <p id="scoreText">Score: 0 / 0</p>
    <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:grey; cursor:pointer;">Quit Quiz</button>
  </div>

  <div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
  </div>

  <script>
    const quizData = [
        { eng: 'amma / avva', kn_kodava: 'ಅಮ್ಮ / ಅವ್ವ', ml_kodava: 'അമ്മ / അവ്വ', kn_mean: 'ತಾಯಿ', ml_mean: 'അമ്മ' },
      { eng: 'appa / appayya', kn_kodava: 'ಅಪ್ಪ / ಅಪ್ಪಯ್ಯ', ml_kodava: 'അപ്പ / അപ്പയ്യ', kn_mean: 'ತಂದೆ', ml_mean: 'അച്ഛൻ ' },
      { eng: 'tāta', kn_kodava: 'ತಾತ', ml_kodava: 'താത', kn_mean: 'ಅಜ್ಜ', ml_mean: 'മുത്തച്ഛൻ' },
      {eng: 'avvayya / avva', kn_kodava: 'ಅವ್ವಯ್ಯ / ಅವ್ವ', ml_kodava: 'അവ്വയ്യ / അവ്വ', kn_mean: 'ಅಜ್ಜಿ ', ml_mean: 'മുത്തശ്ശി' },
      { eng: 'ŏḍiya', kn_kodava: 'ಒಡಿಯ', ml_kodava: 'ഒഡിയ', kn_mean: 'ಗಂಡ', ml_mean: 'ഭർത്താവ്' },
      { eng: 'pŏnn', kn_kodava: 'ಪೊನ್ನ್', ml_kodava: 'പൊന്ന്', kn_mean: 'ಹೆಂಡತಿ', ml_mean: 'ഭാര്യ' },
      { eng: 'kuññi', kn_kodava: 'ಕುಞ್ಞಿ', ml_kodava: 'കുഞ്ഞി', kn_mean: 'ಮಗು', ml_mean: 'കുട്ടി' },
      { eng: 'kinna', kn_kodava: 'ಕಿನ್ನ', ml_kodava: 'കിന്ന', kn_mean: 'ಹುಡುಗ', ml_mean: 'ആൺകുട്ടി' },
      { eng: 'mūḍi', kn_kodava: 'ಮೂಡಿ', ml_kodava: 'മൂഡി', kn_mean: 'ಹುಡುಗಿ', ml_mean: 'പെൺകുട്ടി' },
      { eng: 'moṁva', kn_kodava: 'ಮೋಂವ', ml_kodava: 'മോംവ', kn_mean: 'ಮಗ', ml_mean: 'മകൻ' },
      { eng: 'mova', kn_kodava: 'ಮೋವ', ml_kodava: 'മോവ', kn_mean: 'ಮಗಳು', ml_mean: 'മകൾ' },
      { eng: 'krmoṁva', kn_kodava: 'ಕ್‍ರ್‍ಮೋಂವ', ml_kodava: 'ക്ര്മോംവ', kn_mean: 'ಮೊಮ್ಮಗ', ml_mean: 'കൊച്ചുമകൻ' },
      { eng: 'krmova', kn_kodava: 'ಕ್‍ರ್‍ಮೋವ', ml_kodava: 'ക്ര്മോവ', kn_mean: 'ಮೊಮ್ಮಗಳು', ml_mean: 'കൊച്ചുമകൾ' },
      { eng: 'akkayya', kn_kodava: 'ಅಕ್ಕಯ್ಯ', ml_kodava: 'അക്കയ്യ', kn_mean: 'ಅಕ್ಕ', ml_mean: 'ചേച്ചി' },
      { eng: 'taṁgi', kn_kodava: 'ತಂಗಿ', ml_kodava: 'തംഗി', kn_mean: 'ತಂಗಿ', ml_mean: 'അനിയത്തി' },
       { eng: 'aṇṇayya', kn_kodava: 'ಅಣ್ಣಯ್ಯ', ml_kodava: 'അണ്ണയ്യ', kn_mean: 'ಅಣ್ಣ', ml_mean: 'ചേട്ടൻ' },
      { eng: 'tammana', kn_kodava: 'ತಮ್ಮನ', ml_kodava: 'തമ്മന', kn_mean: 'ತಮ್ಮ', ml_mean: 'അനിയൻ' },
      { eng: 'mŏmma', kn_kodava: 'ಮೊಮ್ಮ', ml_kodava: 'മൊമ്മ', kn_mean: 'ಅತ್ತಿಗೆ', ml_mean: 'നാത്തൂൻ' },
      { eng: 'bāva', kn_kodava: 'ಬಾವ', ml_kodava: 'ബാവ', kn_mean: 'ಬಾವ ', ml_mean: 'അളിയൻ' },
      { eng: 'bojappa', kn_kodava: 'ಬೋಜಪ್ಪ', ml_kodava: 'ബോജപ്പ', kn_mean: 'ಹಿರಿಯ ಚಿಕ್ಕಪ್ಪ', ml_mean: 'വലിയച്ഛൻ ' },
      { eng: 'bojavva', kn_kodava: 'ಬೋಜವ್ವ', ml_kodava: 'ബോജവ്വ', kn_mean: 'ಚಿಕ್ಕಮ್ಮ / ಅತ್ತೆ', ml_mean: 'അമ്മായി' },
      { eng: 'bojimāva ', kn_kodava: 'ಬೋಜಿಮಾವ', ml_kodava: 'ബോജിമാവ', kn_mean: 'ಕಿರಿಯ ಚಿಕ್ಕಪ್ಪ', ml_mean: 'വലിയച്ഛൻ' },
      { eng: 'bojimāyi', kn_kodava: 'ಬೋಜಿಮಾಯಿ', ml_kodava: 'ബോജിമായി', kn_mean: 'ಕಿರಿಯ ಅತ್ತೆ', ml_mean: 'ഇളയമ്മ ' },
      { eng: 'baḷḷiyappa', kn_kodava: 'ಬಳ್ಳಿಯಪ್ಪ', ml_kodava: 'ബള്ളിയപ്പ', kn_mean: 'ಹಿರಿಯ ಚಿಕ್ಕಪ್ಪ', ml_mean: 'വലിയച്ഛൻ ' },
      { eng: 'baḷḷiyavva', kn_kodava: 'ಬಳ್ಳಿಯವ್ವ', ml_kodava: 'ബള്ളിയവ്വ', kn_mean: 'ಚಿಕ್ಕಮ್ಮ / ಅತ್ತೆ', ml_mean: 'വലിയമ്മ ' },
      { eng: 'baḷḷimāva', kn_kodava: 'ಬಳ್ಳಿಮಾವ', ml_kodava: 'ബള്ളിമാവ', kn_mean: 'ಹಿರಿಯ ಚಿಕ್ಕಪ್ಪ', ml_mean: 'വലിയച്ഛൻ' },
      { eng: 'baḷḷimāyi', kn_kodava: 'ಬಳ್ಳಿಮಾಯಿ', ml_kodava: 'ബള്ളിമായി', kn_mean: 'ಹಿರಿಯ ಅತ್ತೆ', ml_mean: 'വലിയമ്മ' },
      { eng: 'macina', kn_kodava: 'ಮಚಿನ', ml_kodava: 'മചിന', kn_mean: 'ಬಾವ ', ml_mean: 'അളിയൻ ' },
      { eng: 'maciñci', kn_kodava: 'ಮಚಿಂಚಿ', ml_kodava: 'മചിഞ്ചി', kn_mean: 'ಅತ್ತಿಗೆ', ml_mean: 'ജ്യേഷ്ഠത്തിഅമ്മ' },
      {  eng: 'māyi', kn_kodava: 'ಮಾಯಿ', ml_kodava: 'മായി', kn_mean: 'ಅತ್ತೆ ', ml_mean: 'അമ്മായി' },
      {  eng: 'māva', kn_kodava: 'ಮಾವ', ml_kodava: 'മാവ', kn_mean: 'ಮಾವ', ml_mean: 'മാമൻ' },
      {  eng: 'maima', kn_kodava: 'ಮೈಮ', ml_kodava: 'മൈമ', kn_mean: 'ಸೊಸೆ ', ml_mean: 'മരുമകൾ' },

    ];

    let currentLanguage = 'kn';
    let currentQuizIndex = 0;
    let score = 0;
    let selectedSet = [];

    function init() {
      renderGallery();
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${lang}`).classList.add('active');
      document.getElementById('main-title').textContent = (lang === 'kn') ? 'ಕೊಡವ ಪಡಿಪು' : 'കൊടവ പഠിപ്പു';
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      quizData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        
        // Removed the zoomImage click since there is no image to zoom
        div.onclick = null; 
        
        const kodavaWord = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;
        const meaning = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
        
        // Cleaned HTML: No img tag, and structured for text-only cards
        div.innerHTML = `
          <div class="word-label">
            <span class="word-kodava">${kodavaWord}</span>
            <span class="word-eng">- ${item.eng} -</span>
            <span class="word-mean">${meaning}</span>
          </div>
        `;
        gallery.appendChild(div);
      });
  
    }

    function zoomImage(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    function startQuiz() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      selectedSet = shuffleArray([...quizData]);
      currentQuizIndex = 0;
      score = 0;
      loadCard();
    }

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function loadCard() {
      if (currentQuizIndex >= selectedSet.length) {
        alert(`Finished! Score: ${score} / ${selectedSet.length}`);
        location.reload();
        return;
      }
      const item = selectedSet[currentQuizIndex];
      const wordDisplay = document.getElementById('kodavaWordDisplay');
      const optionsDiv = document.getElementById('optionButtons');
      wordDisplay.textContent = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;

      const correct = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
      let options = [correct];
      while (options.length < 4) {
        let randomItem = quizData[Math.floor(Math.random() * quizData.length)];
        let randomWord = (currentLanguage === 'kn') ? randomItem.kn_mean : randomItem.ml_mean;
        if (!options.includes(randomWord)) options.push(randomWord);
      }

      optionsDiv.innerHTML = '';
      shuffleArray(options).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, correct, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btn) {
      const allBtns = document.querySelectorAll('.option');
      allBtns.forEach(b => b.onclick = null);
      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      }
      currentQuizIndex++;
      setTimeout(() => {
        document.getElementById('scoreText').textContent = `Score: ${score} / ${currentQuizIndex}`;
        document.getElementById('bar').style.width = `${(currentQuizIndex / selectedSet.length) * 100}%`;
        loadCard();
      }, 1000);
    }

    init();
  </script>
</body>
</html>
