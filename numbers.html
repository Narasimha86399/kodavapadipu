    header {

    .nav-box {

      color: white !important;

      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-box:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); filter: brightness(1.1); }
    
    .nav-home { background-color: #555; }
    .nav-letters { background-color: #e67e22; }
    .nav-animals { background-color: #27ae60; }
    .nav-insects { background-color: #2980b9; }
    .nav-households { background-color: #e213c0; }
    .nav-relations { background-color: #12e8f0; }
    .nav-pronouns { background-color: #1d06ec; }
    .nav-time { background-color: #d63a0a; }
    .nav-body { background-color: #06e951; }

    .nav-numbers { background-color: #8de763; }
    .nav-verbs { background-color: #79261b; }

    nav a, .lang-btn {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      background: white;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Automatically fits more items per row */
  gap: 15px;
  max-width: 950px;
  margin: 30px auto;
  padding: 0 20px;
}

    .gallery-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { 
  width: 100%; 
  height: 150px; /* Reduced from 200px */
  object-fit: contain; /* Shows full image without cropping */
  background: #f0f0f0; /* Adds a light background for transparent images */
  border-radius: 8px; 
}
    
    /* Style for the multi-part label */
    .word-label {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .word-kodava { font-size: 22px; color: var(--primary-color); font-weight: bold; }
    .word-eng { font-size: 16px; color: #666; font-style: italic; }
    .word-mean { font-size: 18px; color: #333; border-top: 1px solid #eee; padding-top: 5px; }

    #quiz-section {

      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
    }

  max-width: 100%; 
  max-height: 200px; /* Reduced from 300px */
  object-fit: contain; 
  border-radius: 10px; 
  margin-bottom: 10px;
}
    .kannadaWord { font-size: 36px; margin: 20px 0; color: var(--primary-color); }
    .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }

    .option {
      padding: 15px 30px;
      font-size: 22px;
      background: #fff;
      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      cursor: pointer;
      min-width: 180px;
      transition: 0.2s;
    }

    .option.correct { background-color: #90ee90 !important; border-color: var(--success-color) !important; }
    .option.wrong { background-color: #ffcccb !important; border-color: var(--wrong-color) !important; }

    #bar { height: 100%; width: 0%; background: var(--success-color); transition: 0.4s; }

    #modal {
      display: none;
      position: fixed;

    let currentLanguage = 'kn';
    let currentQuizIndex = 0;
    let score = 0;
    let selectedSet = [];

    function init() {
      renderGallery();
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${lang}`).classList.add('active');
      document.getElementById('main-title').textContent = (lang === 'kn') ? 'ಕೊಡವ ಪಡಿಪು' : 'കൊടവ പഠിപ്പു';
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      quizData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.onclick = () => zoomImage(item.img);
        
        const kodavaWord = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;
        const meaning = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
        
        div.innerHTML = `
          <img src="${item.img}" alt="${item.eng}">
          <div class="word-label">
            <span class="word-kodava">${kodavaWord}</span>
            <span class="word-eng">- ${item.eng} -</span>
            <span class="word-mean">${meaning}</span>
          </div>
        `;
        gallery.appendChild(div);
      });
    }

    function zoomImage(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    function startQuiz() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      selectedSet = shuffleArray([...quizData]);
      currentQuizIndex = 0;
      score = 0;
      loadCard();
    }

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function loadCard() {
      if (currentQuizIndex >= selectedSet.length) {
        alert(`Finished! Score: ${score} / ${selectedSet.length}`);
        location.reload();
        return;
      }
      const item = selectedSet[currentQuizIndex];
      const wordDisplay = document.getElementById('kodavaWordDisplay');
      const optionsDiv = document.getElementById('optionButtons');
      wordDisplay.textContent = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;

      const correct = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
      let options = [correct];
      while (options.length < 4) {
        let randomItem = quizData[Math.floor(Math.random() * quizData.length)];
        let randomWord = (currentLanguage === 'kn') ? randomItem.kn_mean : randomItem.ml_mean;
        if (!options.includes(randomWord)) options.push(randomWord);
      }

      optionsDiv.innerHTML = '';
      shuffleArray(options).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, correct, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btn) {
      const allBtns = document.querySelectorAll('.option');
      allBtns.forEach(b => b.onclick = null);
      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      }
      currentQuizIndex++;
      setTimeout(() => {
        document.getElementById('scoreText').textContent = `Score: ${score} / ${currentQuizIndex}`;
        document.getElementById('bar').style.width = `${(currentQuizIndex / selectedSet.length) * 100}%`;
        loadCard();
      }, 1000);
    }

    init();
  </script>
</body>
</html>
