<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodava Padipu - Learn & Quiz</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Kannada:wght@400;700&family=Noto+Serif+Malayalam:wght@400;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #80004d;
      --secondary-color: #5d0fee;
      --success-color: #28a745;
      --wrong-color: #dc3545;
    }

    body {
      font-family: 'Noto Serif Kannada', 'Noto Serif Malayalam', serif;
      background: #f9f9f9;
      margin: 0;
      text-align: center;
      color: #333;
    }

    header {
      background-color: var(--primary-color);
      color: white;
      padding: 30px 10px;
    }

    .header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .Kodava-logo { width: 120px; height: auto; }
    h1 { margin: 0; font-size: 32px; }

    nav {
  background-color: #f2f2f2;
  padding: 12px;
  border-bottom: 2px solid #ddd;
  display: flex;
  justify-content: center;
  gap: 10px;          /* Reduced gap slightly for better fit */
  row-gap: 15px;      /* Adds vertical space between rows */
  align-items: center;
  flex-wrap: wrap;    /* THIS IS THE KEY: allows items to wrap to a second line */
}
    .nav-box {
      text-decoration: none;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 10px;
      color: white !important;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-box:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); filter: brightness(1.1); }
    
    .nav-home { background-color: #555; }
    .nav-letters { background-color: #e67e22; }
    .nav-animals { background-color: #27ae60; }
    .nav-insects { background-color: #2980b9; }
    .nav-households { background-color: #e213c0; }
    .nav-relations { background-color: #12e8f0; }
    .nav-pronouns { background-color: #1d06ec; }
    .nav-time { background-color: #d63a0a; }
    .nav-body { background-color: #06e951; }
    .nav-colours { background-color: #0a0b0c; }
    .nav-numbers { background-color: #8de763; }
    .nav-verbs { background-color: #79261b; }

    nav a, .lang-btn {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
      background: white;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* Automatically fits more items per row */
  gap: 15px;
  max-width: 950px;
  margin: 30px auto;
  padding: 0 20px;
}

    .gallery-item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { 
  width: 100%; 
  height: 150px; /* Reduced from 200px */
  object-fit: contain; /* Shows full image without cropping */
  background: #f0f0f0; /* Adds a light background for transparent images */
  border-radius: 8px; 
}
    
    /* Style for the multi-part label */
    .word-label {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .word-kodava { font-size: 22px; color: var(--primary-color); font-weight: bold; }
    .word-eng { font-size: 16px; color: #666; font-style: italic; }
    .word-mean { font-size: 18px; color: #333; border-top: 1px solid #eee; padding-top: 5px; }

    #quiz-section {
      display: none;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
    }

    .flashcard-image img { 
  max-width: 100%; 
  max-height: 200px; /* Reduced from 300px */
  object-fit: contain; 
  border-radius: 10px; 
  margin-bottom: 10px;
}
    .kannadaWord { font-size: 36px; margin: 20px 0; color: var(--primary-color); }
    .options { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }

    .option {
      padding: 15px 30px;
      font-size: 22px;
      background: #fff;
      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      cursor: pointer;
      min-width: 180px;
      transition: 0.2s;
    }

    .option.correct { background-color: #90ee90 !important; border-color: var(--success-color) !important; }
    .option.wrong { background-color: #ffcccb !important; border-color: var(--wrong-color) !important; }

    .btn-start {
      background: var(--primary-color);
      color: white;
      padding: 18px 60px;
      font-size: 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 40px 0;
      box-shadow: 0 4px 15px rgba(128, 0, 77, 0.3);
    }

    #progress { height: 12px; width: 80%; background: #eee; margin: 30px auto 10px; border-radius: 10px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: var(--success-color); transition: 0.4s; }

    #modal {
      display: none;
      position: fixed;
      z-index: 2000;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
    }
    #modal img { max-width: 90%; max-height: 85%; border: 4px solid white; }
  </style>
</head>
<body>

  <header>
    <div class="header-content">
      <img src="kodavalogo.png" alt="Kodava-logo" class="Kodava-logo">
      <h1 id="main-title">ಕೊಡವ ಪಡಿಪು</h1>
    </div>
  </header>
<nav>
    <a href="index.html" class="nav-box nav-home"><i class="fas fa-home"></i> Home</a>
    <a href="letters.html" class="nav-box nav-letters"><i class="fas fa-font"></i> Letters</a>
    <a href="animals.html" class="nav-box nav-animals"><i class="fas fa-paw"></i> Animals</a>
    <a href="insects.html" class="nav-box nav-insects"><i class="fas fa-bug"></i> Insects</a>
    <a href="households.html" class="nav-box nav-households"><i class="fas fa-couch"></i> Households</a>
    <a href="relations.html" class="nav-box nav-relations"><i class="fas fa-users"></i> Relations</a>
    <a href="pronouns.html" class="nav-box nav-pronouns"><i class="fas fa-user-tag"></i> Pronouns</a>
    <a href="time.html" class="nav-box nav-time"><i class="fas fa-clock"></i> Time</a>
    <a href="body.html" class="nav-box nav-body"><i class="fas fa-child"></i> Body</a>
    <a href="colours.html" class="nav-box nav-colours"><i class="fas fa-palette"></i> Colours</a>
    <a href="numbers.html" class="nav-box nav-numbers"><i class="fas fa-list-ol"></i> Numbers</a>
     <a href="verbs.html" class="nav-box nav-numbers"><i class="fas fa-running"></i> Verbs</a>
  </nav>
  <nav>
    <button id="btn-kn" class="lang-btn active" onclick="setLanguage('kn')">ಕನ್ನಡ</button>
    <button id="btn-ml" class="lang-btn" onclick="setLanguage('ml')">മലയാളം</button>
  </nav>

  <div id="home-screen">
    <div class="gallery-container" id="gallery"></div>
    <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="quiz-section">
    <div class="kannadaWord" id="kodavaWordDisplay"></div>
    <div class="options" id="optionButtons"></div>
    <div id="progress"><div id="bar"></div></div>
    <p id="scoreText">Score: 0 / 0</p>
    <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:grey; cursor:pointer;">Quit Quiz</button>
  </div>

  <div id="modal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
  </div>

  <script>
    const quizData = [
      
      { img: 'honeybee.jpg', eng: 'Thaen Val’nji', kn_kodava: 'ತೇನ್ ವಲ್ಂಜಿ', ml_kodava: 'തേൻ വൽംജി', kn_mean: 'ಜೇನುನೊಣ', ml_mean: 'തേനീച്ച' },
      { img: 'housefly.jpg', eng: 'Val’nji', kn_kodava: 'ವಲ್ಂಜಿ', ml_kodava: 'വൽംജി', kn_mean: 'ನೊಣ', ml_mean: 'ഈച്ച' },
      { img: 'leech.jpg', eng: 'Umb’l’', kn_kodava: 'ಉಂಬ್‌ಳ್', ml_kodava: 'ഉംബ്ള്', kn_mean: 'ಜಿಗಣೆ', ml_mean: 'അട്ട' },
      { img: 'earthworm.jpg', eng: 'Erepuḷu', kn_kodava: 'ಎರೆಪುಳು', ml_kodava: 'എരെപുളു', kn_mean: 'ಎರೆಹುಳು', ml_mean: 'മണ്ണീര' },
      { img: 'firefly.jpg', eng: 'minnampuḷu', kn_kodava: 'ಮಿನ್ನಂಪುಳು', ml_kodava: 'മിന്നംപുളു', kn_mean: 'ಮಿಂಚುಹುಳು', ml_mean: 'മിന്നാമിന്നി' },
      { img: 'cicida.jpg', eng: 'Geeje', kn_kodava: 'ಗೀಜೆ', ml_kodava: 'ഗീജെ', kn_mean: 'ಹೂಗುಟ್ಟುವ ಹುಳು', ml_mean: 'ചീവീട്' },
      { img: 'wasp.jpg', eng: 'kaḍandi', kn_kodava: 'ಕಡಂದಿ', ml_kodava: 'കഡന്ദി', kn_mean: 'ಕಣಜ', ml_mean: 'കടന്നൽ' },
      { img: 'spider.jpg', eng: 'Kolamba', kn_kodava: 'ಕೊಳಂಬ', ml_kodava: 'കൊളംബ', kn_mean: 'ಜೇಡ', ml_mean: 'ചിലന്തി' },
      { img: 'millipede.jpg', eng: 'Kerete', kn_kodava: 'ಕೆರಟೆ', ml_kodava: 'കെരടെ', kn_mean: 'ಸಹಸ್ರಪದಿ', ml_mean: 'തെരട്ട' },
       { img: 'pillmillipede.jpg', eng: 'aḍikĕ puḷu', kn_kodava: 'ಅಡಿಕೆ ಪುಳು', ml_kodava: 'അഡികെ പുളു', kn_mean: 'ಗುಂಡು ಹುಳು', ml_mean: 'മരപ്പട്ടി' },
      { img: 'caterpillar.jpg', eng: 'Nerpacha', kn_kodava: 'ನೆರ್‌ಪಚ್ಚ', ml_kodava: 'നെർപച്ച', kn_mean: 'ಕಂಬಳಿಹುಳು', ml_mean: 'കമ്പിളിപ്പുഴു' },
      { img: 'butterfly.jpg', eng: 'Chitte', kn_kodava: 'ಚಿಟ್ಟೆ', ml_kodava: 'ചിട്ടെ', kn_mean: 'ಚಿಟ್ಟೆ', ml_mean: 'ചിത്രശലഭം' },
      { img: 'cockroach.jpg', eng: 'Paathe', kn_kodava: 'ಪಾತೆ', ml_kodava: 'പാതെ', kn_mean: 'ಜಿರಳೆ', ml_mean: 'കൂറ/ പാറ്റ' },
      { img: 'mosquito.jpg', eng: 'Soḷḷe', kn_kodava: 'ಸೊಳ್ಳೆ', ml_kodava: 'സൊള്ളെ', kn_mean: 'ಸೊಳ್ಳೆ', ml_mean: 'കൊതുക്' },
      { img: 'ant.jpg', eng: 'Irpu', kn_kodava: 'ಇರ್‌ಪು', ml_kodava: 'ഇർപു', kn_mean: 'ಇರುವೆ', ml_mean: 'ഉറുമ്പ്' },
      { img: 'fireant.jpg', eng: 'kĕñjĕ irpu', kn_kodava: 'ಕೆಂಜೆ ಇರ್‌ಪು', ml_kodava: 'കെഞ്ജെ ഇർപു', kn_mean: 'ಕೆಂಪು ಇರುವೆ', ml_mean: 'കടന്നൽ ഉറുമ്പ് /ചോണമ്പ്' },
      { img: 'grasshopper.jpg', eng: 'Pachepukka ', kn_kodava: 'ಪಚ್ಚೆಪುಕ್ಕ', ml_kodava: 'പച്ചെപുക്ക', kn_mean: 'ಮಿಡತೆ', ml_mean: 'വെട്ടുക്കിളി' },
      { img: 'dragonfly.jpg', eng: 'Thumbi', kn_kodava: 'ತುಂಬಿ', ml_kodava: 'തുംബി', kn_mean: 'ತೂತುನೊಣ', ml_mean: 'തുമ്പി' },
      { img: 'snail.jpg', eng: 'koṭañji', kn_kodava: 'ಕೋಟಂಜಿ', ml_kodava: 'കോടഞ്ജി', kn_mean: 'ಬಸವನಹುಳು', ml_mean: 'ഉഭയജീവി/അത്ത' },
      { img: 'rubberbeetle.jpg', eng: 'pandi puḷu', kn_kodava: 'ಪಂದಿಪುಳು', ml_kodava: 'പന്ദിപുളു', kn_mean: 'ರಬ್ಬರ್ ದುಂಬಿ', ml_mean: 'റബ്ബർ വണ്ട്' },
      { img: 'bedbug.jpg', eng: 'Moote ', kn_kodava: 'ಮೂಟೆ', ml_kodava: 'മൂടെ', kn_mean: 'ತಿಗಣೆ', ml_mean: 'മൂട്ട' },
      { img: 'dungbeetle.jpg', eng: 'cāṇa puḷu', kn_kodava: 'ಚಾಣ ಪುಳು', ml_kodava: 'ചാണ പുളു', kn_mean: 'ಗೊಬ್ಬರದ ಹುಳು', ml_mean: 'ചാണക /വണ്ട്' },
      { img: 'scorpion.jpg', eng: 'Chaeḷ’', kn_kodava: 'ಚೇಳ್', ml_kodava: 'ചേൾ', kn_mean: 'ಚೇಳು', ml_mean: 'തേൾ' },
      { img: 'termite.jpg', eng: 'Maḷe pathe', kn_kodava: 'ಮಳೆಪಾತೆ', ml_kodava: 'മളെപാതെ', kn_mean: 'ಈಚಲು / ಗೆದ್ದಲು ಹುಳು', ml_mean: 'ഈയൽ / ചിതൽ' },
    ];

    let currentLanguage = 'kn';
    let currentQuizIndex = 0;
    let score = 0;
    let selectedSet = [];

    function init() {
      renderGallery();
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${lang}`).classList.add('active');
      document.getElementById('main-title').textContent = (lang === 'kn') ? 'ಕೊಡವ ಪಡಿಪು' : 'കൊടവ പഠിപ്പു';
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      quizData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.onclick = () => zoomImage(item.img);
        
        const kodavaWord = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;
        const meaning = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
        
        div.innerHTML = `
          <img src="${item.img}" alt="${item.eng}">
          <div class="word-label">
            <span class="word-kodava">${kodavaWord}</span>
            <span class="word-eng">- ${item.eng} -</span>
            <span class="word-mean">${meaning}</span>
          </div>
        `;
        gallery.appendChild(div);
      });
    }

    function zoomImage(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    function startQuiz() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      selectedSet = shuffleArray([...quizData]);
      currentQuizIndex = 0;
      score = 0;
      loadCard();
    }

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function loadCard() {
      if (currentQuizIndex >= selectedSet.length) {
        alert(`Finished! Score: ${score} / ${selectedSet.length}`);
        location.reload();
        return;
      }
      const item = selectedSet[currentQuizIndex];
      const wordDisplay = document.getElementById('kodavaWordDisplay');
      const optionsDiv = document.getElementById('optionButtons');
      wordDisplay.textContent = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;

      const correct = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
      let options = [correct];
      while (options.length < 4) {
        let randomItem = quizData[Math.floor(Math.random() * quizData.length)];
        let randomWord = (currentLanguage === 'kn') ? randomItem.kn_mean : randomItem.ml_mean;
        if (!options.includes(randomWord)) options.push(randomWord);
      }

      optionsDiv.innerHTML = '';
      shuffleArray(options).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, correct, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btn) {
      const allBtns = document.querySelectorAll('.option');
      allBtns.forEach(b => b.onclick = null);
      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      }
      currentQuizIndex++;
      setTimeout(() => {
        document.getElementById('scoreText').textContent = `Score: ${score} / ${currentQuizIndex}`;
        document.getElementById('bar').style.width = `${(currentQuizIndex / selectedSet.length) * 100}%`;
        loadCard();
      }, 1000);
    }

    init();
  </script>
</body>
</html>
