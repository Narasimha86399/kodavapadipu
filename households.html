    .gallery-container {

}

    .gallery-item {
      background: white;

      transition: transform 0.2s;
    }

    .gallery-item:hover { transform: scale(1.02); }
    .gallery-item img { 
  width: 100%;

}
    
    /* Style for the multi-part label */
    .word-label {

    .kannadaWord { font-size: 36px; margin: 20px 0; color: var(--primary-color); }

    .option {

      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      cursor: pointer;
      min-width: 180px;

    .option.correct { background-color: #90ee90 !important; border-color: var(--success-color) !important; }

    .btn-start {

    #progress { height: 12px; width: 80%; background: #eee; margin: 30px auto 10px; border-radius: 10px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: var(--success-color); transition: 0.4s; }

    #modal {

</head>

      { img: 'mat.jpg', eng: 'palṁb', kn_kodava: 'ಪಲ್ಂಬ್', ml_kodava: 'പൽംബ്', kn_mean: 'ಚಾಪೆ', ml_mean: 'പായ' },

      { img: 'couldron.jpg', eng: 'kala', kn_kodava: 'ಕಲ', ml_kodava: 'കല', kn_mean: 'ಕೊಪ್ಪರಿಗೆ', ml_mean: 'വാർപ്പ്' },

    let currentLanguage = 'kn';
    let currentQuizIndex = 0;
    let score = 0;
    let selectedSet = [];

    function init() {
      renderGallery();
    }

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${lang}`).classList.add('active');
      document.getElementById('main-title').textContent = (lang === 'kn') ? 'ಕೊಡವ ಪಡಿಪು' : 'കൊടവ പഠിപ്പു';
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      quizData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.onclick = () => zoomImage(item.img);
        
        const kodavaWord = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;
        const meaning = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
        
        div.innerHTML = `
          <img src="${item.img}" alt="${item.eng}">
          <div class="word-label">
            <span class="word-kodava">${kodavaWord}</span>
            <span class="word-eng">- ${item.eng} -</span>
            <span class="word-mean">${meaning}</span>
          </div>
        `;
        gallery.appendChild(div);
      });
    }

    function zoomImage(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').style.display = 'flex';
    }

    function startQuiz() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-section').style.display = 'block';
      selectedSet = shuffleArray([...quizData]);
      currentQuizIndex = 0;
      score = 0;
      loadCard();
    }

    function shuffleArray(arr) {
      return arr.sort(() => Math.random() - 0.5);
    }

    function loadCard() {
      if (currentQuizIndex >= selectedSet.length) {
        alert(`Finished! Score: ${score} / ${selectedSet.length}`);
        location.reload();
        return;
      }
      const item = selectedSet[currentQuizIndex];
      const wordDisplay = document.getElementById('kodavaWordDisplay');
      const optionsDiv = document.getElementById('optionButtons');
      wordDisplay.textContent = (currentLanguage === 'kn') ? item.kn_kodava : item.ml_kodava;

      const correct = (currentLanguage === 'kn') ? item.kn_mean : item.ml_mean;
      let options = [correct];
      while (options.length < 4) {
        let randomItem = quizData[Math.floor(Math.random() * quizData.length)];
        let randomWord = (currentLanguage === 'kn') ? randomItem.kn_mean : randomItem.ml_mean;
        if (!options.includes(randomWord)) options.push(randomWord);
      }

      optionsDiv.innerHTML = '';
      shuffleArray(options).forEach(opt => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(opt, correct, btn);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct, btn) {
      const allBtns = document.querySelectorAll('.option');
      allBtns.forEach(b => b.onclick = null);
      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
      }
      currentQuizIndex++;
      setTimeout(() => {
        document.getElementById('scoreText').textContent = `Score: ${score} / ${currentQuizIndex}`;
        document.getElementById('bar').style.width = `${(currentQuizIndex / selectedSet.length) * 100}%`;
        loadCard();
      }, 1000);
    }

    init();
  </script>
</body>
